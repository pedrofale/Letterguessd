<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letterguessd — Guess the Daily Movie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>

<body>
    <div class="app-container">
        <header>
            <h1><span class="lb-orange">L</span>etter<span class="lb-green">g</span>uess<span class="lb-blue">d</span>
            </h1>
            <p>Guess the daily movie from Letterboxd reviews</p>
        </header>

        <main id="game-board">
            <div class="stats-bar">
                <span id="guesses-remaining">Guesses left: <span class="highlight">10</span></span>
            </div>

            <div id="reviews-container">
                <!-- Reviews injected by JS -->
            </div>

            <div id="guess-area" class="guess-area">
                <form id="guess-form">
                    <input type="text" id="guess-input" placeholder="Guess a movie..." autocomplete="off">
                    <button type="submit" id="guess-button">Guess</button>
                    <button type="button" id="skip-button" class="secondary-btn">Skip</button>
                </form>
                <div id="feedback-message" class="hidden"></div>
            </div>

            <div id="end-screen" class="glass-panel hidden">
                <h2 id="end-title">You Win!</h2>
                <div class="movie-reveal">
                    <p>The movie was</p>
                    <a id="movie-title-link" href="#" target="_blank" rel="noopener">
                        <h3 id="movie-title">Movie Title</h3>
                    </a>
                    <!-- Poster shown after game ends, src filled by app.js -->
                    <img id="movie-poster" src="" alt="Movie Poster" class="hidden">
                </div>
                <div id="end-stats"></div>
                <div id="share-preview"></div>
                <button id="share-button">Share Result</button>
                <div id="share-toast" class="hidden">Copied to clipboard!</div>
            </div>
        </main>
    </div>
</body>

</html>
